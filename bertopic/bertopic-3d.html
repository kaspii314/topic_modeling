ntacted Walgreens to replace the cards. I was told to contact the Merchant (Starbucks). I called Starbu"],["0_card_account_gift_called","I have been purchasing Starbucks a lot using my cash app card. I reached out to Starbucks customer service so they could add my purchases or receipts to my account for points. I emailed them and received an automated email back saying someone will re"],["0_card_account_gift_called","I received a gift card on 4\u002f20\u002f2023 but not able to use it today, 5\u002f11\u002f2023. I believe no one should purchase Starbucks gift card anymore, because this is the 2nd time I was not able to use a Starbucks gift card...the first time was a thank-you card "],["0_card_account_gift_called","My account got blocked, I cannot log in and I have a substantial balance there. I have already spent hours on the phone with customer service trying to resolve this. The issue was even \"escalated\" to a senior rep. But after months of going back and f"],["0_card_account_gift_called","On 01\u002f23\u002f2023 I purchased Starbucks beverage located in Las Vegas. Upon receiving the beverage (Caramel Macchiato), it was drowned in Caramel Sauce. Caramel was thrown in the cup and to top it off an excessive amount of Caramel was put on top. I requ"],["0_card_account_gift_called","I had purchased a drink on my app at an airport. I went to pick it up and they said they could not make my drink because the blender was broken down and could not refund my money. I asked them how I would get my money back. They said there's a phone "],["0_card_account_gift_called","Purchased one cup of coffee and was charged 3 times for 1 cup so I am owed a credit to my debit card, however I was told after calling the 800 number that they will not be able to give me credit and the store will not likely give me a credit because "],["0_card_account_gift_called","I'm not even sure what the point of loading my Starbucks card was. They are never open anymore. I have 4 stores that are my usu  package as \"Refunds only provided for unused cards with the original receipt\" printed, I would expect there was a system in place to handle th"],["0_card_account_gift_called","Spent almost $1,500 at Starbucks and didn\u2019t gave me my rewards. Been a gold member on or before year 2011 but representative said there\u2019s nothing they can do. I emailed the corporate 2 to 3 times but got nothing. What a poor communicator."],["0_card_account_gift_called","After seeing reloads on my account and then a $55 transfer, I called Starbucks customer service at 800-782-7282 and Debra advised that it will take 7-10 business days to reverse the charge off my credit account. Also, she couldn't tell me where the $"],["0_card_account_gift_called","Double Charged - No Refund - No Accountability. Last Friday, January 12th, 2018, around 630 AM (PST) I bought my wife a Starbucks E-Giftcard. The amount was for $15.00. I have done this a few times prior and every purchase was without fault. Had my w"],["0_card_account_gift_called","I received my bank statement and noticed two back to back unauthorized charges for 50 dollars each. I have called Starbucks over ten times to get this resolved. Three times they hung up on me. The rest were a mix of random options, none of which has "],["0_card_account_gift_called","Well, I have had a lot of issues using my Starbucks card. I called customer service to get a new card over a year ago and never received my card. I didn't have time to call and get a new card so I just didn't use it. Also, your customer service is Go"],["0_card_account_gift_called","I called customer service to ask them to add my receipt from the store so I can have a stars added to my account. I explain to the representative that I left my phone at home that's why I have to pay cash. And his response was rude, well it's a one-t"],["0_card_account_gift_called","I received a promotional email to buy $10 eGift card through Visa checkout and receive a $10 eGift card in return. It's been over a month and I was told I would receive it on Sept 30, 2017 but I still have not received it. My son also bought into thi"],["0_card_account_gift_called","The stores can make their own rules which contrast with corporate policies and the Head Office don't even care about it. We even showed the store manager about the policies but they're ignored. We spent so much money to get to gold level and got my b"],["0_card_account_gift_called","Recently, I noticed that the card balance went down faster than usual. Also heard from 2 friends over the past 3 months that money would be taken from their cards mysteriously. So, out of curiosity, I checked the purchase history. I discovered the un"],["0_card_account_gift_called","I called on 2\u002f3\u002f17 due to accidentally deleting one of the cards with a just reloaded balance on my phone app while still trying to figure out how to use the app. I was in the store and had receipts for just reloading the card that was accidentally d"],["0_card_account_gift_called","On 12\u002f3, I ordered a traveler, a demi mug and some Verismo pods. I paid with my Starbucks card and the money was removed. On 12\u002f9, I called to check on the status of the order. I was assured it would ship, and that it would update on 12\u002f10. On 12\u002f10,"],["0_card_account_gift_called","I went to Starbucks online site and my password wasn't recognized. I followed their directions and changed my password. The site recognized the change until I used it. Had to change the password 4 times. Finally, I phoned the company. Their response,"],["0_card_account_gift_called","For a week now I've been unable to order because the shopping cart is literally broken, and according to each person I've dealt with, it has something to do with PayPal. I cannot delete items from the shopping cart. The shopping cart broke when I sel"],["0_card_account_gift_called","I am very disappointed in Starbucks online service. On July 6th, I ordered and paid for a tumbler. Received a tracking # from them, but 6 days later the tracking # still showed no info. on its movement. Meaning... it never got sent out. I called and "],["0_card_account_gift_called","My child's teacher LOVES Starbucks coffee. So at the end of this school year (2015-2016), on June 2 to be exact, I bought a Starbucks' gift card for my child's teacher. I had asked the cashier to put 100.00 on the gift card. The cashier charged me 20"],["0_card_account_gift_called","I tried to reload my card via app on June 22, and it failed because of a \"system error.\" When I spoke to customer service, apparently this was a big issue for Starbucks app on June 22. I saw on my bank account that Starbucks had charged me 4 times th"],["0_card_account_gift_called","ONLINE STORE IS USELESS. You can only call Mon.-Fri. 8 a.m.-5 p.m -- terrible customer service. Takes 10 days before they ship the order. Now they are using lowest level of delivery, takes 7-10 days to arrive. They are continually out of stock on ite"],["0_card_account_gift_called","I ordered a Verisimo 600 Brewer. I received an email confirming my order. I never received an email telling me that the order was shipped and when I kept checking their website to see when it was coming, there was nothing showing, not even my order. "],["0_card_account_gift_called","Tried to reload my rewards card. Twice, Starbucks \"declined\" my transactions. Therefore, went to a physical location to reload my account. Moron at the drive-thru ran my card for $50+$9.23=$59.23. Checked my Starbucks account balance. It showed a bal"],["0_card_account_gift_called","I was at the Starbucks drive through on 10-17-15, my app had a .45 cents balance. When I tried to reload card the app crashed & the Starbucks Widget showed 0.00 balance wiping out my account I paid cash. The app kept crashing, I called Starbucks auto"],["0_card_account_gift_called","I tried to enter this customer code to enter a user online survey, but it wouldn't accept my customer code."] .864253520965576,6.626404762268066,6.698215484619141,6.5341010093688965,6.6496806144714355],"type":"scatter3d"},{"customdata":[["1_coffee_drink_charge_cup","Every time I try to buy a Strawberry Refresher Starbucks never has strawberries to put into the drink. How is the drink called Strawberry Refresher and you guys never have any damn strawberries. It seems every time we go on the Starbucks to order a s"],["1_coffee_drink_charge_cup","I WAS OVERCHARGED FOR A VENTI BROWN SUGAR SHAKEN ESPRESSO. I looked at my paypal notification and there was 13.40$ taken from my account for the coffee drink. Very unhappy about it. I would like a refund of the total price. If not I will never buy an"],["1_coffee_drink_charge_cup","Starbucks offers reusable holiday cups when purchasing a holiday beverage. They refused a diabetic an unsweetened beverage because it was not one of their \u201choliday\u201d beverages. One would think they could have been more accommodating."],["1_coffee_drink_charge_cup","The Starbucks coffee drinks cost a good deal of money. So when I pay for a coffee drink. I expect to get coffee, not a milkshake. But there are milkshakes hidden in the Frappuccino menu. If it is for kids. It should be labeled \"kids drinks\" or \"milks"],["1_coffee_drink_charge_cup","Starbucks is supposed to be a quality brand and we love Starbucks coffee. Recently their centres have started cutting cost by not providing paper bags when we purchase a product from Starbucks. We regularly buy coffee beans worth $20 from Starbucks a"],["1_coffee_drink_charge_cup","How can people drink the awfully burnt tasting coffee from Starbucks. Overpriced poor tasting. Better to go to Dunkin. Starbucks uses cheaply source beans and roasts them to death. Not only burn the beans, also burn the essential oils."],["1_coffee_drink_charge_cup","So very disappointed with Starbucks. How is it possible to sell signature holiday drinks without the required ingredients? Their excuse for not having the supplies is getting tired. I heard these same excuses during the summer. I'd rather make my cof"],["1_coffee_drink_charge_cup","I ordered regular coffee and asked for cream. They charged an extra $.70 for the cream. The coffee was very hot, and I was about 30 miles away before I took a drink, and then realized that they had not put in the cream. Charging $.70 for cream is a r"],["1_coffee_drink_charge_cup","I frequent about 10 Starbucks in the Richmond Virginia area. I noted that prices have risen 10% in the past year but I still buy. It seems that now in 2020 8 out of 10 times when I purchase a Venti coffee, the cup is only partially filled. Most times"],["1_coffee_drink_charge_cup","Regular hot coffee of different sizes is too insipid and tastes almost like hot water in several Starbucks locations in southern California. One of the possible causes for the insipidity of Starbucks regular hot coffee is that store coffee brewers ar"],["1_coffee_drink_charge_cup","I have been a loyal customer of Starbucks for over 15yrs. Lately I have noticed my venti blond has a blah taste. More like cheap gas station coffee. It wasn't just me, I asked several family members what they thought. They verified it was gross coffe"],["1_coffee_drink_charge_cup","They charge ~5$ for a chai tea Latte and does not train the employees how to make them, each store make it their own way. Horrific experience today at a Starbucks in Riverside, CA. They literally give me boiling Milk. I asked them to add more tea, th"],["1_coffee_drink_charge_cup","Bought the cocoa cloud in a couple of locations and man what a waste of money. The last drink I got was 80-85% foam. This has been the trend. Pathetic especially since we are paying full price for the drink which is over after a couple of sips."],["1_coffee_drink_charge_cup","I was a regular customer, ended up hating Starbucks due to their poor customer service and unkept promises. Let me write down what I have gone through: 1. Collected stickers (18 beverages) to collect 2019 Planner\u002fOrganizer. (Completed 4 Sets). 2. I h"],["1_coffee_drink_charge_cup","I reached out to Starbucks customer service centre on 2 to 3 occasion and they will reward me with $10 card or free coffee but not solving the issue on the ground. Issue - when you ask for Tall and pay for Tall but you end up receiving one half or le"],["1_coffee_drink_charge_cup","I was unaware they charge extra to change the type of milk or to put it on ice. I can see extra fee for shots of espresso but it should be stated so you know about it. Be upfront about pricing. List of on the menu."],["1_coffee_drink_charge_cup","Went to the Linwood shop with my wife, ordered two cappuccinos hers. Didn't taste of hardly any coffee. Mine was supposed to be a double. Shot just tasted sour. Without doubt the worst Starbucks experience in my life. Felt sick. Didn't finish my coff"],["1_coffee_drink_charge_cup","I thought a global brand as Starbucks setting extremely high beverages prices would be at least concern about their reputation, quality and hygiene! Yesterday morning I decided to get the cold lemon mint drink from Starbucks branch in City Stars Mall"],["1_coffee_drink_charge_cup","I get severe HEARTBURN and INDIGESTION with 1 cup of coffee. I changed brands, no more heartburn and indigestion. Yeah. SO IF YOU GET HEARTBURN AND INDIGESTION IT COULD BE FROM THEIR COFFEE. I had to change brands."],["1_coffee_drink_charge_cup","I've been going to Starbucks for about 10 years. I don't know what's going on with these Utah stores but none of the stores make the coffees the same. I go to Clinton, Clearfield, Layton, Layton Smith's, Clinton Smith's, Riverdale, Ogden, and Farming"],["1_coffee_drink_charge_cup","Increase on cup of coffee June 2018 - Spoiled my daily intake (habit) of purchasing the tall (small) cup of Java for 1.95. 2.15 is too much already and I was a Gold Carder. Goodnight to the SBucks because it's just not really worth it. There's other "],["1_coffee_drink_charge_cup","Starbucks is getting more and more pricey for a bad cup of whatever you drink. Everyone is sucked into this need to spend half your paycheck for a bad cup of Joe. Just because it's trendy. The quality of service and product has drop over the years bu"],["1_coffee_drink_charge_cup","Better coffee made at home. Unknown why people pay high prices for high fat drinks with poor service. Does anyone have imagination to see a bad deal when presented with it?"],["1_coffee_drink_charge_cup","I spent 29.95+tax on a simple thermal cup - Valentine's day theme. The \"Starbucks\" on the side has already come off, you can't put it in the dishwasher, can't handle carbonated drink (not that I drink soda but I may want one some day). So not worth $"],["1_coffee_drink_charge_cup","I'm very dissatisfied with the flavor level of the coffee Starbucks store are brewing especially in Fremont stores. They are watering down their coffee too much and the way they are upkeeping their store one sloppy mess."],["1_coffee_drink_charge_cup","Again after 2-3 weeks again went to the Starbucks close by to get a coffee. I had been there more often before but because the 2 Starbucks around me offering boiled and muddy coffee I have avoided going there. Today again I went there. I asked if it "],["1_coffee_drink_charge_cup","I buy smoothies from different places and this time for a change I bought a smoothie from STARBUCKS from a Starbucks outlet in Silver Spring, Maryland. It tasted so bad than all other smoothies I tasted over the years. Starbucks is good for ONLY COFF"],["1_coffee_drink_charge_cup","I ordered two ice teas and requested no water or syrup, but did request extra ice. The clerk rang the order up and then told me she would have to charge me an extra 75 cents for each drink because I had ask for NO water. The charge was rung up as tho"],["1_coffee_drink_charge_cup","Here we go!! Every morning that I wake up all I want is 20 oz cup of dark roast coffee... is that too much to ask? I a he Starbucks Cafe we go to is in a Market32\u002fPrice Chopper grocery stor"],["8_stars_rewards_program_free","I used to spend over $100 a month in Starbucks coffee and do the receipt upload for stars as part of the loyalty rewards on top of buying several drinks from the on site barista when I was near one as I am not local to any. Then Starbucks stopped the"],["8_stars_rewards_program_free","2) Starbucks has continuously cut their rewards program over the past few years. Now, you have to \u2018activate\u2019 double star days. They know the more trouble they put people through, the less people will get the benefit."],["8_stars_rewards_program_free","I have been a loyal customer for 10+ yrs...however, I've won multiple prizes on the most recent Starbucks app game but the prizes don't get delivered to my account. Customer service didn't know how to help. I've spent money to play the game trying to"],["8_stars_rewards_program_free","Starbucks rewards program is a total joke. I have been a loyal customer for years. Lately I\u2019ve found out that the offers they send out to customers for bonus stars are really a slap in the face to regular customers and favor the rare or occasional cu"],["8_stars_rewards_program_free","It was bad enough when your birthday reward was only good for 3 days. This year it's only 1! Everywhere else, you have around a month! It's like, they're afraid you'll ACTUALLY use it! It's just bad customer service!"],["8_stars_rewards_program_free","When Starbucks changed the \"rewards\" to \"stars\", they eliminated the unlimited free purchases, now if you order more than one item, you don't get the discount on multiple purchases, as you did with the old \"rewards\" program, and there was no notice o"],["8_stars_rewards_program_free","Just became aware of the new rewards program that once again requires more points for the same free item. No spin will change the facts that they are again making it more difficult to achieve reward benefits. Am now having 2nd thoughts about continui"],["8_stars_rewards_program_free","Long time customer however, I starting noticing about their reward program\u002fchallenges etc, so I Joined in a few times, when it thought it was worth it. Anyway 2 time in one year I did complete the challenges, and they manage to steal the stars (POINT"],["8_stars_rewards_program_free","The fact that you don\u2019t even allow a one week grace period to use Birthday rewards now is the stupidest thing I\u2019ve ever heard and it\u2019s not right. Starbucks is so money hungry now that you don\u2019t even let me decide when I can go get my free coffee. Wha"],["8_stars_rewards_program_free","HALF THE TIME I DON'T GET BONUS STARS LIKE I SHOULD...And have to call Starbucks customer service. After wasting about 35 minutes each time, I might get the stars I earned. Starbucks is expensive, and purchasing the drinks required to earn rewards wi"],["8_stars_rewards_program_free","This has been going on for years and customer service has never resolved the issue. Every time I receive an email for a challenge or promotion, I click on \"Activate the offer\" or \"Join the Dash.\" I always read the fine print, purchase the items requi"],["8_stars_rewards_program_free","Just tried to use a coupon that I got at the Starbucks in Havertown PA (West Chester Pike). 50% off a lunch item after 11 am (it's 2pm). They said that they don't honor the coupon. Yep they gave them out. But they don't accept them. What kind of way "],["8_stars_rewards_program_free","I'm sure you've heard a lot of feedback on the Stars program, but I want to point out two very important things (to me) about what you have done to your loyal customers. First, the new Stars program makes it more difficult and certainly more expensiv"],["8_stars_rewards_program_free","When I found out today about the new Starbucks reward program, I couldn't believe it. I guess I will be giving up my daily habit as it is not worth it anymore. They make the new program out
